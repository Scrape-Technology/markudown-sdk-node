# Publishes markudown-engine to npm on every push of a version tag (v*.*.*).
#
# How to release:
#   1. Bump "version" in package.json
#   2. git add package.json && git commit -m "chore: bump to vX.Y.Z"
#   3. git tag vX.Y.Z && git push origin vX.Y.Z
#
# Required GitHub secret:
#   NPM_TOKEN  — Automation token from npmjs.com (Settings → Access Tokens → Generate → Automation)

name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    name: Build & publish
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create a GitHub Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Verify version matches tag
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "✅ Version match: $PKG_VERSION"

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "markudown-sdk ${{ github.ref_name }}"
          generate_release_notes: true
